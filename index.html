<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Project Outro | We're cooking something</title>
    <meta name="title" content="Project Outro | We're cooking something" />
    <meta name="description" content="Project Outro is cooking something. Stay tuned for updates." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://projectoutro.com/" />
    <meta property="og:title" content="Project Outro" />
    <meta property="og:description" content="We're cooking something. Stay tuned." />
    <meta property="og:image" content="https://projectoutro.com/public/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://projectoutro.com/" />
    <meta property="twitter:title" content="Project Outro" />
    <meta property="twitter:description" content="We're cooking something. Stay tuned." />
    <meta property="twitter:image" content="https://projectoutro.com/public/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="public/favicon.svg" />
    <link rel="apple-touch-icon" href="public/favicon.svg" />
    <meta name="theme-color" content="#000000" />
    
    <style>
      @font-face {
        font-family: "Nersans";
        src: url("./public/fonts/Nersans%20Three.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        color: #fff;
        font-family: "Nersans", sans-serif;
        overflow: hidden;
      }

      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        opacity: 0.8;
        pointer-events: none;
      }

      .container {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
      }

      .logo {
        max-width: 90%;
        width: 600px;
        height: auto;
        margin-bottom: 2.5rem;
      }

      h1 {
        font-size: 2.5rem;
        letter-spacing: 2px;
        margin-bottom: 2rem;
        font-weight: normal;
        line-height: 1.4;
        text-transform: uppercase;
      }

      .email {
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-decoration: none;
        color: #fff;
        opacity: 0.7;
        transition: opacity 0.3s ease;
        font-family: sans-serif;
      }

      .email:hover {
        opacity: 1;
        text-decoration: underline;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.6rem;
        }
        .logo {
          width: 350px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="dotsCanvas"></canvas>
    <div class="container">
      <img src="./public/logo.PNG" alt="Project Outro" class="logo" />
      <h1>We're cooking something.<br />Stay tuned.</h1>
      <a href="mailto:hello@projectoutro.com" class="email"
        >hello@projectoutro.com</a
      >
    </div>

    <script>
      const canvas = document.getElementById("dotsCanvas");
      const ctx = canvas.getContext("2d");

      let dots = [];
      const dotSize = 3;
      const spacing = 40;

      function initDots() {
        dots = [];
        for (let x = 0; x < canvas.width; x += spacing) {
          for (let y = 0; y < canvas.height; y += spacing) {
            dots.push({
              x: x,
              y: y,
              // Random initial opacity and target
              opacity: Math.random() > 0.7 ? Math.random() : 0,
              targetOpacity: Math.random() > 0.7 ? Math.random() : 0,
              speed: 0.005 + Math.random() * 0.015,
            });
          }
        }
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initDots();
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let dot of dots) {
          // Move opacity smoothly towards target
          if (dot.opacity < dot.targetOpacity) {
            dot.opacity += dot.speed;
            if (dot.opacity > dot.targetOpacity) dot.opacity = dot.targetOpacity;
          } else if (dot.opacity > dot.targetOpacity) {
            dot.opacity -= dot.speed;
            if (dot.opacity < dot.targetOpacity) dot.opacity = dot.targetOpacity;
          }

          // Intermittently assign new random target opacities to simulate appearing and disappearing
          if (dot.opacity === dot.targetOpacity && Math.random() < 0.005) {
            // Pick a new target opacity (either visible or hidden)
            dot.targetOpacity = Math.random() > 0.7 ? Math.random() * 0.8 + 0.2 : 0;
            // Slightly vary speed per transition
            dot.speed = 0.005 + Math.random() * 0.015;
          }

          if (dot.opacity > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${dot.opacity})`;
            ctx.fillRect(dot.x, dot.y, dotSize, dotSize);
          }
        }

        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", resize);
      resize();
      animate();
    </script>
  </body>
</html>
