<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Outro</title>
    <style>
      @font-face {
        font-family: "Nersans";
        src: url("./public/fonts/Nersans%20Three.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #000;
        color: #fff;
        font-family: "Nersans", sans-serif;
        overflow: hidden;
      }

      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        opacity: 0.8;
        pointer-events: none;
      }

      .container {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
      }

      .logo {
        max-width: 90%;
        width: 600px;
        height: auto;
        margin-bottom: 2.5rem;
      }

      h1 {
        font-size: 2.5rem;
        letter-spacing: 2px;
        margin-bottom: 2rem;
        font-weight: normal;
        line-height: 1.4;
        text-transform: uppercase;
      }

      .email {
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-decoration: none;
        color: #fff;
        opacity: 0.7;
        transition: opacity 0.3s ease;
        font-family: sans-serif;
      }

      .email:hover {
        opacity: 1;
        text-decoration: underline;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 1.6rem;
        }
        .logo {
          width: 350px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="dotsCanvas"></canvas>
    <div class="container">
      <img src="./public/logo.PNG" alt="Project Outro" class="logo" />
      <h1>We're cooking something.<br />Stay tuned.</h1>
      <a href="mailto:hello@projectoutro.com" class="email"
        >hello@projectoutro.com</a
      >
    </div>

    <script>
      const canvas = document.getElementById("dotsCanvas");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drawDots();
      }

      function drawDots() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";

        const dotSize = 3;
        const spacing = 40;

        for (let x = 0; x < canvas.width; x += spacing) {
          for (let y = 0; y < canvas.height; y += spacing) {
            if (Math.random() > 0.7) {
              ctx.fillRect(x, y, dotSize, dotSize);
            }
          }
        }
      }

      window.addEventListener("resize", resize);
      resize();
    </script>
  </body>
</html>
